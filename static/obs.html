<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OBS Audio Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; width: 800px; height: 200px; font-family: 'Segoe UI', sans-serif; }

  #notification {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); border: 2px solid #53fc18;
    border-radius: 12px; padding: 12px 24px;
    color: #53fc18; font-size: 1rem; font-weight: 600;
    white-space: nowrap; letter-spacing: 0.5px;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  #notification.show { opacity: 1; }

  #sonidos-panel {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.9); border: 2px solid #53fc18;
    border-radius: 12px; padding: 16px 24px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    max-width: 780px;
  }
  #sonidos-panel.show { opacity: 1; }
  #sonidos-panel h3 { color: #53fc18; font-size: 0.85rem; margin-bottom: 10px; }
  #sonidos-list {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .cmd-chip {
    background: #1a1a1a; border: 1px solid #53fc18;
    color: #53fc18; border-radius: 6px;
    padding: 3px 10px; font-size: 0.8rem; font-family: monospace;
  }
</style>
</head>
<body>

<div id="notification"></div>
<div id="sonidos-panel">
  <h3>🎵 Sonidos disponibles</h3>
  <div id="sonidos-list"></div>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
let socket;
let sonidosTimer;
let notifTimer;

function connect() {
  socket = new WebSocket(WS_URL);

  socket.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'play') {
      playAudio(data.url, data.command);
    } else if (data.type === 'sonidos') {
      showSonidos(data.commands);
    }
  };

  socket.onclose = () => {
    setTimeout(connect, 3000);
  };
}

function playAudio(url, command) {
  const audio = new Audio(url);
  audio.volume = 1.0;
  audio.play().catch(console.error);

  // Show notification
  const notif = document.getElementById('notification');
  notif.textContent = `🔊 ${command}`;
  notif.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => notif.classList.remove('show'), 3000);
}

function showSonidos(commands) {
  const panel = document.getElementById('sonidos-panel');
  const list = document.getElementById('sonidos-list');
  list.innerHTML = commands.map(c => `<span class="cmd-chip">${c}</span>`).join('');
  panel.classList.add('show');
  clearTimeout(sonidosTimer);
  sonidosTimer = setTimeout(() => panel.classList.remove('show'), 8000);
}

connect();
</script>
</body>
</html>
