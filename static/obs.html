<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OBS Audio Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; width: 800px; height: 200px; font-family: 'Segoe UI', sans-serif; }
  #notification {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.88); border: 2px solid #53fc18; border-radius: 12px;
    padding: 10px 22px; color: #53fc18; font-size: 1rem; font-weight: 700;
    white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #notification.show { opacity: 1; }
  #sonidos-panel {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.92); border: 2px solid #53fc18; border-radius: 12px;
    padding: 14px 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 780px;
  }
  #sonidos-panel.show { opacity: 1; }
  #sonidos-panel h3 { color: #53fc18; font-size: 0.8rem; margin-bottom: 8px; }
  #sonidos-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .cmd-chip {
    background: rgba(83,252,24,0.1); border: 1px solid #53fc18;
    color: #53fc18; border-radius: 5px; padding: 2px 8px;
    font-size: 0.78rem; font-family: monospace;
  }
</style>
</head>
<body>
<div id="notification"></div>
<div id="sonidos-panel">
  <h3>🎵 Sonidos disponibles — escribe el comando en el chat</h3>
  <div id="sonidos-list"></div>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
let socket;
let notifTimer, sonidosTimer;
let globalVol = parseFloat(localStorage.getItem('globalVol') ?? '80') / 100;

function connect() {
  socket = new WebSocket(WS_URL);
  socket.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'play') playAudio(data.url, data.command, data.volume ?? 80);
    else if (data.type === 'sonidos') showSonidos(data.commands);
    else if (data.type === 'set_volume') { globalVol = data.value / 100; localStorage.setItem('globalVol', data.value); }
  };
  socket.onclose = () => setTimeout(connect, 3000);
}

function playAudio(url, command, soundVol) {
  const audio = new Audio(url);
  audio.volume = Math.min(1, (soundVol / 100) * globalVol);
  audio.play().catch(console.error);
  const notif = document.getElementById('notification');
  notif.textContent = `🔊 ${command}`;
  notif.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => notif.classList.remove('show'), 3000);
}

function showSonidos(commands) {
  const panel = document.getElementById('sonidos-panel');
  document.getElementById('sonidos-list').innerHTML = commands.map(c => `<span class="cmd-chip">${c}</span>`).join('');
  panel.classList.add('show');
  clearTimeout(sonidosTimer);
  sonidosTimer = setTimeout(() => panel.classList.remove('show'), 8000);
}

connect();
</script>
</body>
</html>
