<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OBS Audio Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent; overflow: hidden;
    width: 1920px; height: 1080px;
    font-family: 'Segoe UI', sans-serif;
  }

  /* NOTIFICACION de sonido */
  #notification {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%) translateY(-10px);
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, rgba(0,5,20,0.97), rgba(0,20,50,0.95));
    border: 2px solid #00aaff; border-radius: 12px;
    padding: 11px 22px;
    box-shadow: 0 0 20px rgba(0,170,255,0.4), inset 0 0 16px rgba(0,170,255,0.04);
    opacity: 0;
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none; min-width: 240px; max-width: 420px;
  }
  #notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .notif-icon {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #0077cc, #00aaff);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    box-shadow: 0 0 12px rgba(0,170,255,0.6);
  }
  .notif-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .notif-label {
    font-size: 0.68rem; color: #5ab4e0; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .notif-cmd {
    font-family: monospace; font-size: 1.05rem; font-weight: 700;
    color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .notif-bar {
    position: absolute; bottom: 0; left: 0; height: 2px;
    background: linear-gradient(to right, #00aaff, #0044cc);
    border-radius: 0 0 12px 12px;
    width: 100%; transform-origin: left;
    animation: none;
  }
  #notification.show .notif-bar {
    animation: shrink var(--dur, 4s) linear forwards;
  }
  @keyframes shrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }

  /* PANEL de sonidos */
  #sonidos-panel {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%) translateY(-14px);
    background: linear-gradient(135deg, rgba(0,5,20,0.97), rgba(0,20,50,0.95));
    border: 2px solid #00aaff; border-radius: 12px;
    padding: 10px 16px; max-width: 680px;
    box-shadow: 0 0 28px rgba(0,170,255,0.4), inset 0 0 20px rgba(0,170,255,0.04);
    opacity: 0; transform: translateY(-14px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }
  #sonidos-panel.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #sonidos-panel h3 {
    color: #00aaff; font-size: 0.72rem; margin-bottom: 8px;
    letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
  }
  #sonidos-panel h3::before {
    content: ''; display: inline-block; width: 6px; height: 6px;
    background: #00aaff; border-radius: 50%;
    box-shadow: 0 0 6px #00aaff;
  }
  #sonidos-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .cmd-chip {
    background: rgba(0,170,255,0.12); border: 1px solid rgba(0,170,255,0.5);
    color: #e0f4ff; border-radius: 6px; padding: 3px 10px;
    font-size: 0.75rem; font-family: monospace; font-weight: 600;
  }
</style>
</head>
<body>

<div id="notification">
  <div class="notif-icon">&#128266;</div>
  <div class="notif-body">
    <span class="notif-label">Sonando ahora</span>
    <span class="notif-cmd" id="notif-cmd"></span>
  </div>
  <div class="notif-bar" id="notif-bar"></div>
</div>

<div id="sonidos-panel">
  <h3 id="sonidos-titulo">Sonidos disponibles — escribe el comando en el chat</h3>
  <div id="sonidos-list"></div>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
let socket;
let notifTimer, sonidosTimer;
let globalVol = parseFloat(localStorage.getItem('globalVol') ?? '80');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function connect() {
  socket = new WebSocket(WS_URL);
  socket.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'play') playAudio(data.url, data.command, data.volume ?? 80);
    else if (data.type === 'sonidos') showSonidos(data.commands, data.titulo);
    else if (data.type === 'set_volume') { globalVol = data.value; localStorage.setItem('globalVol', data.value); }
  };
  socket.onclose = () => setTimeout(connect, 3000);
}

async function playAudio(url, command, soundVol) {
  const gain = (soundVol / 100) * (globalVol / 100);
  try {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const response = await fetch(url, { mode: 'cors' });
    const arrayBuffer = await response.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = gain;
    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    source.start(0);
    showNotification(command, audioBuffer.duration);
  } catch(e) {
    console.warn('Web Audio fallback:', e);
    const audio = new Audio(url);
    audio.volume = Math.min(1, gain);
    audio.play().catch(console.error);
    showNotification(command, 4);
  }
}

function showNotification(command, duration) {
  const notif = document.getElementById('notification');
  const bar = document.getElementById('notif-bar');
  document.getElementById('notif-cmd').textContent = command;

  // Reiniciar animacion de barra
  bar.style.animation = 'none';
  bar.style.setProperty('--dur', (duration + 0.5) + 's');
  notif.classList.remove('show');
  void notif.offsetWidth; // forzar reflow
  notif.classList.add('show');
  bar.style.animation = '';

  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => notif.classList.remove('show'), (duration + 0.5) * 1000);
}

function showSonidos(commands, titulo) {
  const panel = document.getElementById('sonidos-panel');
  document.getElementById('sonidos-titulo').textContent =
    titulo || 'Sonidos disponibles — escribe el comando en el chat';
  document.getElementById('sonidos-list').innerHTML =
    commands.map(c => `<span class="cmd-chip">${c}</span>`).join('');
  panel.classList.remove('show');
  void panel.offsetWidth;
  panel.classList.add('show');
  clearTimeout(sonidosTimer);
  sonidosTimer = setTimeout(() => panel.classList.remove('show'), 20000);
}

connect();
</script>
</body>
</html>
