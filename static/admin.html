<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Kick Audios — TutoManX</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<style>
:root {
  --primary: #00aaff;
  --primary-dim: rgba(0,170,255,0.12);
  --gold: #FFD700;
  --gold-dim: rgba(255,215,0,0.12);
  --red: #ff4d4d;
  --bg: #07090f;
  --surface: rgba(10,15,30,0.92);
  --surface2: rgba(0,10,25,0.85);
  --border: rgba(0,170,255,0.2);
  --text: #e8f0ff;
  --muted: #5a7090;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif; color: var(--text); min-height: 100vh;
  background: #07090f url('/static/bg.jpg') center center / cover fixed no-repeat;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: rgba(5,8,20,0.72); pointer-events: none; z-index: 0;
}
#login-screen, #app { position: relative; z-index: 1; }

/* LOGIN */
#login-screen {
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
}
.login-card {
  background: var(--surface); border: 1px solid rgba(255,215,0,0.35);
  backdrop-filter: blur(16px);
  border-radius: 20px; padding: 48px 40px; width: 380px; text-align: center;
  box-shadow: 0 0 60px rgba(83,252,24,0.08);
}
.login-logo { font-size: 2.5rem; margin-bottom: 8px; }
.login-card h2 { font-size: 1.4rem; margin-bottom: 4px; }
.login-card > p { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }

.user-selector { display: flex; gap: 10px; margin-bottom: 20px; }
.user-btn {
  flex: 1; padding: 14px 10px; border-radius: 12px; border: 2px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer;
  font-size: 0.88rem; font-weight: 600; transition: all 0.2s; text-align: center;
}
.user-btn:hover { border-color: var(--primary); color: var(--primary); }
.user-btn.selected { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
.user-btn .user-icon { font-size: 1.6rem; display: block; margin-bottom: 5px; }
.user-btn.selected-mod { border-color: var(--gold); background: rgba(255,215,0,0.1); color: var(--gold); }

.input-wrap { position: relative; margin-bottom: 14px; }
.input-wrap input {
  width: 100%; padding: 12px 16px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
}
.input-wrap input:focus { border-color: var(--primary); }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 20px; border: none; border-radius: 10px; cursor: pointer;
  font-size: 0.88rem; font-weight: 600; transition: opacity 0.15s, transform 0.1s;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: #000; }
.btn-red { background: var(--red); color: #fff; }
.btn-blue { background: var(--gold); color: #fff; }
.btn-ghost { background: var(--surface2); color: #c0d8f0; border: 1px solid var(--border); }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg { color: var(--red); font-size: 0.82rem; margin-top: 10px; min-height: 18px; }
.role-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
}
.role-admin { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.4); }
.role-mod { background: rgba(0,170,255,0.15); color: var(--primary); border: 1px solid rgba(0,170,255,0.35); }

/* HEADER */
header {
  backdrop-filter: blur(16px); background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 60px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
.logo { font-size: 1.1rem; font-weight: 700; color: var(--gold); flex-shrink: 0; }
.channel-tag { color: var(--muted); font-size: 0.82rem; }
.spacer { flex: 1; }
.vol-wrap { display: flex; align-items: center; gap: 10px; }
.vol-wrap label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
.vol-slider {
  -webkit-appearance: none; width: 110px; height: 4px;
  background: linear-gradient(to right, var(--primary) 0%, var(--primary) var(--val, 40%), #333 var(--val, 40%), #333 100%);
  border-radius: 4px; outline: none; cursor: pointer;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--primary); border-radius: 50%; cursor: pointer;
}
.vol-pct { font-size: 0.8rem; color: var(--gold); width: 36px; text-align: right; }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* LAYOUT */
.container { max-width: 960px; margin: 0 auto; padding: 28px 16px; }

/* OBS BANNER */
.obs-banner {
  background: var(--primary-dim); border: 1px solid rgba(0,170,255,0.25);
  border-radius: 12px; padding: 12px 18px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.obs-banner label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 2px; }
.obs-url { font-family: monospace; color: var(--primary); font-size: 0.85rem; }

/* CARD */
.card { backdrop-filter: blur(12px); background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.card-title { font-size: 0.95rem; font-weight: 700; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

/* FORM */
.form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.field label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; }
.field input[type=text], .field input[type=number] {
  width: 100%; padding: 10px 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--primary); }
.field input.error { border-color: var(--red); }
.field-error { color: var(--red); font-size: 0.75rem; margin-top: 3px; }
.file-drop {
  border: 2px dashed var(--border); border-radius: 10px; padding: 20px;
  text-align: center; cursor: pointer; transition: all 0.2s; position: relative; margin-bottom: 14px;
}
.file-drop:hover, .file-drop.over { border-color: var(--primary); background: var(--primary-dim); }
.file-drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.file-drop-icon { font-size: 1.5rem; margin-bottom: 4px; }
.file-drop p { font-size: 0.82rem; color: var(--muted); }
.file-drop .file-chosen { color: var(--primary); font-size: 0.85rem; font-weight: 600; }
.vol-field { display: flex; flex-direction: column; gap: 6px; }
.vol-field label { font-size: 0.75rem; color: var(--muted); }
.vol-row { display: flex; align-items: center; gap: 10px; }
.vol-field .vol-slider { width: 100%; }
.form-footer { display: flex; align-items: center; gap: 10px; }

/* TABLE */
.table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.count-badge { background: var(--gold); color: #000; border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; font-weight: 700; }
.search-input {
  padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 0.85rem; outline: none; width: 200px; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--primary); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 8px 12px; font-size: 0.75rem; color: var(--muted); border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid rgba(0,30,60,0.3); vertical-align: middle; }
tr:hover td { background: rgba(0,30,60,0.4); }
.cmd { font-family: monospace; background: var(--gold-dim); color: var(--gold); padding: 3px 8px; border-radius: 5px; font-size: 0.85rem; }
.filename { color: var(--muted); font-size: 0.8rem; max-width: 200px; width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
td:nth-child(2) { max-width: 200px; width: 200px; overflow: hidden; }
.toggle { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: #3a3a4a; border-radius: 20px; transition: .25s; }
.slider:before { content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #aaa; border-radius: 50%; transition: .25s; }
input:checked + .slider { background: rgba(0,170,255,0.45); }
input:checked + .slider:before { transform: translateX(18px); background: var(--primary); }
.row-vol { display: flex; align-items: center; gap: 6px; }
.row-vol input[type=range] {
  -webkit-appearance: none; width: 70px; height: 3px;
  background: linear-gradient(to right, var(--primary) 0%, var(--primary) var(--val, 40%), #333 var(--val, 40%), #333 100%);
  border-radius: 3px; outline: none; cursor: pointer;
}
.row-vol input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; cursor: pointer; }
.row-vol span { font-size: 0.75rem; color: var(--muted); width: 34px; }
.actions { display: flex; gap: 5px; }
.btn-sm { padding: 5px 10px; font-size: 0.78rem; border-radius: 7px; }
.empty-state { text-align: center; padding: 48px; color: var(--muted); }
.empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 420px; max-width: 95vw; }
.modal h3 { margin-bottom: 20px; color: var(--primary); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px; min-width: 200px;
  padding: 12px 18px; border-radius: 10px; font-size: 0.88rem; font-weight: 500;
  opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: #001a2a; border: 1px solid var(--primary); color: var(--primary); }
.toast.fail { background: #2a0d0d; border: 1px solid var(--red); color: var(--red); }

@media (max-width: 640px) {
  .form-grid { grid-template-columns: 1fr; }
  header { padding: 0 16px; }
  .vol-wrap { display: none; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">&#127925;</div>
    <h2>Bot Kick Audios</h2>
    <p>Selecciona tu perfil para continuar</p>

    <div class="user-selector">
      <div class="user-btn" id="btn-admin" onclick="selectUser('admin')">
        <span class="user-icon">&#128081;</span>
        TutoManX
      </div>
      <div class="user-btn" id="btn-mod" onclick="selectUser('mod')">
        <span class="user-icon">&#128737;</span>
        Moderadores
      </div>
    </div>

    <div class="input-wrap" style="position:relative">
      <input type="password" id="pwd" placeholder="Contrasena" onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:44px">
      <button onclick="togglePwd()" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--muted);padding:0" id="eye-btn">&#128065;</button>
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Entrar</button>
    <div class="error-msg" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <span class="logo">&#127925; Bot Kick</span>
    <span class="channel-tag">kick.com/tutomanx</span>
    <span id="role-badge" class="role-badge"></span>
    <div class="spacer"></div>
    <div class="vol-wrap">
      <label>Volumen global</label>
      <input type="range" class="vol-slider" id="global-vol" min="0" max="200" value="80"
        oninput="updateGlobalVol(this.value)" style="--val:40%">
      <span class="vol-pct" id="global-vol-pct">80%</span>
    </div>
    <button class="logout-btn" onclick="logout()">Salir</button>
  </header>

  <div class="container">

    <div class="obs-banner">
      <div style="flex:1">
        <label>URL para OBS Browser Source</label>
        <span class="obs-url" id="obs-url"></span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="copyObs()">&#128203; Copiar</button>
    </div>

    <div class="card" id="add-card">
      <div class="card-title">+ Agregar nuevo sonido</div>
      <div class="form-grid">
        <div class="field">
          <label>Comando <span style="color:var(--red)">*</span></label>
          <input type="text" id="new-cmd" placeholder="!misonido" oninput="clearFieldError('cmd')">
          <div class="field-error" id="err-cmd"></div>
        </div>
        <div class="field">
          <label>Cooldown (seg)</label>
          <input type="number" id="new-cooldown" value="10" min="0" max="300">
        </div>
        <div class="vol-field field">
          <label>Volumen del sonido</label>
          <div class="vol-row">
            <input type="range" class="vol-slider" id="new-vol" min="0" max="200" value="80"
              oninput="syncVolLabel('new-vol','new-vol-pct')" style="--val:40%">
            <span class="vol-pct" id="new-vol-pct">80%</span>
          </div>
        </div>
      </div>
      <div class="field" style="margin-bottom:14px">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <label class="toggle" style="margin:0">
            <input type="checkbox" id="new-subs-only">
            <span class="slider"></span>
          </label>
          <span>Solo para suscriptores ⭐</span>
        </label>
      </div>
      <div class="file-drop" id="drop-zone"
        ondragover="event.preventDefault();this.classList.add('over')"
        ondragleave="this.classList.remove('over')"
        ondrop="handleDrop(event)">
        <input type="file" id="new-file" accept="audio/*" onchange="onFileChange(this)">
        <div class="file-drop-icon">&#127925;</div>
        <p>Arrastra un archivo de audio o haz click para seleccionar</p>
        <p style="margin-top:4px;font-size:0.75rem">MP3, WAV, OGG &mdash; max. 20 MB</p>
        <div class="file-chosen" id="file-chosen" style="display:none"></div>
      </div>
      <div class="field-error" id="err-file" style="margin-bottom:10px"></div>
      <div class="form-footer">
        <button class="btn btn-primary" id="add-btn" onclick="addSound()">Subir sonido</button>
        <span id="add-status" style="font-size:0.82rem;color:var(--muted)"></span>
      </div>
    </div>

    <div class="card">
      <div class="table-header">
        <div class="card-title" style="margin:0">Sonidos configurados <span class="count-badge" id="count">0</span></div>
        <input type="text" class="search-input" placeholder="Buscar..." oninput="filterTable(this.value)">
      </div>
      <div id="sounds-container"><div class="empty-state"><div class="icon">&#127925;</div>Cargando...</div></div>
    </div>

  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3>Editar sonido</h3>
    <input type="hidden" id="edit-id">
    <div class="field" style="margin-bottom:14px">
      <label>Comando</label>
      <input type="text" id="edit-cmd">
    </div>
    <div class="form-grid-2" style="margin-bottom:14px">
      <div class="field">
        <label>Cooldown (seg)</label>
        <input type="number" id="edit-cooldown" min="0" max="300">
      </div>
      <div class="vol-field field">
        <label>Volumen</label>
        <div class="vol-row">
          <input type="range" class="vol-slider" id="edit-vol" min="0" max="200"
            oninput="syncVolLabel('edit-vol','edit-vol-pct')" style="--val:40%">
          <span class="vol-pct" id="edit-vol-pct">80%</span>
        </div>
      </div>
    </div>
    <div class="field" style="margin-bottom:14px">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
        <label class="toggle" style="margin:0">
          <input type="checkbox" id="edit-subs-only">
          <span class="slider"></span>
        </label>
        <span>Solo para suscriptores ⭐</span>
      </label>
    </div>
    <div class="field" style="margin-bottom:4px">
      <label>Reemplazar audio (opcional)</label>
      <input type="file" id="edit-file" accept="audio/*"
        style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text)">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = location.origin;
let PASSWORD = '';
let ROLE = '';
let SELECTED_USER = '';
let ALL_SOUNDS = [];

function togglePwd() {
  const input = document.getElementById('pwd');
  const btn = document.getElementById('eye-btn');
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.innerHTML = '&#128065;'; }
}

function selectUser(type) {
  SELECTED_USER = type;
  document.getElementById('btn-admin').className = 'user-btn' + (type === 'admin' ? ' selected' : '');
  document.getElementById('btn-mod').className = 'user-btn' + (type === 'mod' ? ' selected-mod' : '');
  document.getElementById('pwd').focus();
  document.getElementById('login-err').textContent = '';
}

async function doLogin() {
  const pwd = document.getElementById('pwd').value.trim();
  if (!SELECTED_USER) { document.getElementById('login-err').textContent = 'Selecciona un perfil primero'; return; }
  if (!pwd) { document.getElementById('login-err').textContent = 'Escribe tu contrasena'; return; }

  const res = await fetch(`${BASE}/api/auth`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ password: pwd })
  });
  if (!res.ok) { document.getElementById('login-err').textContent = 'Contrasena incorrecta'; return; }

  const data = await res.json();
  if (SELECTED_USER === 'admin' && data.role !== 'admin') {
    document.getElementById('login-err').textContent = 'Contrasena incorrecta para TutoManX'; return;
  }
  if (SELECTED_USER === 'mod' && data.role !== 'mod') {
    document.getElementById('login-err').textContent = 'Contrasena incorrecta para Moderadores'; return;
  }

  PASSWORD = pwd;
  ROLE = data.role;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('obs-url').textContent = `${BASE}/obs`;

  const badge = document.getElementById('role-badge');
  if (ROLE === 'admin') {
    badge.textContent = 'TutoManX';
    badge.className = 'role-badge role-admin';
  } else {
    badge.textContent = 'Moderador';
    badge.className = 'role-badge role-mod';
  }
  loadSounds();
}

function logout() {
  PASSWORD = ''; ROLE = ''; SELECTED_USER = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwd').value = '';
  document.getElementById('login-err').textContent = '';
  document.getElementById('btn-admin').className = 'user-btn';
  document.getElementById('btn-mod').className = 'user-btn';
}

function syncVolLabel(sliderId, labelId) {
  const val = document.getElementById(sliderId).value;
  document.getElementById(labelId).textContent = val + '%';
  document.getElementById(sliderId).style.setProperty('--val', (val / 2) + '%');
}

function updateGlobalVol(val) {
  document.getElementById('global-vol-pct').textContent = val + '%';
  document.getElementById('global-vol').style.setProperty('--val', (val / 2) + '%');
  localStorage.setItem('globalVol', val);
}

function onFileChange(input) {
  const f = input.files[0];
  if (f) {
    document.getElementById('file-chosen').textContent = f.name;
    document.getElementById('file-chosen').style.display = 'block';
    clearFieldError('file');
  }
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) {
    const dt = new DataTransfer(); dt.items.add(f);
    document.getElementById('new-file').files = dt.files;
    onFileChange(document.getElementById('new-file'));
  }
}

function clearFieldError(id) {
  const el = document.getElementById('err-' + id);
  if (el) el.textContent = '';
  const inp = document.getElementById('new-' + id);
  if (inp) inp.classList.remove('error');
}

function validateAddForm() {
  let ok = true;
  const cmd = document.getElementById('new-cmd').value.trim();
  const file = document.getElementById('new-file').files[0];
  if (!cmd) { document.getElementById('err-cmd').textContent = 'El comando es obligatorio'; document.getElementById('new-cmd').classList.add('error'); ok = false; }
  else if (cmd.length < 2) { document.getElementById('err-cmd').textContent = 'Minimo 2 caracteres'; ok = false; }
  if (!file) { document.getElementById('err-file').textContent = 'Selecciona un archivo de audio'; ok = false; }
  else {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['mp3','wav','ogg','m4a'].includes(ext)) { document.getElementById('err-file').textContent = 'Solo MP3, WAV u OGG'; ok = false; }
    if (file.size > 20*1024*1024) { document.getElementById('err-file').textContent = 'Maximo 20 MB'; ok = false; }
  }
  return ok;
}

async function loadSounds() {
  const res = await fetch(`${BASE}/api/sounds`);
  ALL_SOUNDS = await res.json();
  renderTable(ALL_SOUNDS);
}

function renderTable(sounds) {
  document.getElementById('count').textContent = sounds.length;
  const el = document.getElementById('sounds-container');
  if (!sounds.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#127925;</div>No hay sonidos. Agrega el primero.</div>';
    return;
  }
  const isAdmin = ROLE === 'admin';
  el.innerHTML = `<table>
    <thead><tr>
      <th>Comando</th><th>Archivo</th><th>Cooldown</th><th>Volumen</th><th>Activo</th><th>Solo subs ⭐</th><th>Acciones</th>
    </tr></thead>
    <tbody>
    ${sounds.map(s => {
      const vol = s.volume ?? 80;
      const pct = Math.round(vol / 2);
      return `<tr>
        <td><span class="cmd">${s.command}</span></td>
        <td><span class="filename" title="${s.filename}">${s.filename}</span></td>
        <td>${s.cooldown}s</td>
        <td>
          <div class="row-vol">
            <input type="range" min="0" max="200" value="${vol}" style="--val:${pct}%"
              oninput="onRowVolChange(this)"
              onchange="saveVolume(${s.id}, this.value)">
            <span id="rvol-${s.id}">${vol}%</span>
          </div>
        </td>
        <td>
          <label class="toggle">
            <input type="checkbox" ${s.active ? 'checked' : ''} onchange="toggleActive(${s.id},this.checked)">
            <span class="slider"></span>
          </label>
        </td>
        <td>
          <label class="toggle">
            <input type="checkbox" ${s.subs_only ? 'checked' : ''} onchange="toggleSubsOnly(${s.id},this.checked)">
            <span class="slider"></span>
          </label>
        </td>
        <td>
          <div class="actions">
            <button class="btn btn-blue btn-sm" onclick="testSound(${s.id})" title="Probar">&#9654;</button>
            <button class="btn btn-ghost btn-sm" onclick="openEdit(${s.id})">&#9998;</button>
            ${isAdmin ? `<button class="btn btn-red btn-sm" onclick="deleteSound(${s.id},'${s.command}')">&#10005;</button>` : ''}
          </div>
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}

function filterTable(q) {
  const f = ALL_SOUNDS.filter(s =>
    s.command.toLowerCase().includes(q.toLowerCase()) ||
    s.filename.toLowerCase().includes(q.toLowerCase())
  );
  renderTable(f);
}

function onRowVolChange(input) {
  const val = input.value;
  input.style.setProperty('--val', Math.round(val / 2) + '%');
  const id = input.closest('tr').querySelector('[id^=rvol-]')?.id?.replace('rvol-','');
  if (id) document.getElementById('rvol-' + id).textContent = val + '%';
}

async function saveVolume(id, vol) {
  await fetch(`${BASE}/api/sounds/${id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ volume: parseInt(vol), password: PASSWORD })
  });
  const s = ALL_SOUNDS.find(x => x.id === id);
  if (s) s.volume = parseInt(vol);
  showToast('Volumen guardado');
}

async function addSound() {
  if (!validateAddForm()) return;
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Subiendo...';

  const fd = new FormData();
  fd.append('command', document.getElementById('new-cmd').value.trim());
  fd.append('cooldown', document.getElementById('new-cooldown').value);
  fd.append('volume', document.getElementById('new-vol').value);
  fd.append('subs_only', document.getElementById('new-subs-only').checked ? '1' : '0');
  fd.append('password', PASSWORD);
  fd.append('file', document.getElementById('new-file').files[0]);

  const res = await fetch(`${BASE}/api/sounds`, { method: 'POST', body: fd });
  btn.disabled = false; btn.textContent = 'Subir sonido';

  if (res.ok) {
    showToast('Sonido agregado');
    document.getElementById('new-cmd').value = '';
    document.getElementById('new-file').value = '';
    document.getElementById('file-chosen').style.display = 'none';
    loadSounds();
  } else {
    const err = await res.json();
    document.getElementById('add-status').textContent = err.detail || 'Error al subir';
    document.getElementById('add-status').style.color = 'var(--red)';
  }
}

async function toggleActive(id, active) {
  await fetch(`${BASE}/api/sounds/${id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ active, password: PASSWORD })
  });
}

async function toggleSubsOnly(id, subs_only) {
  await fetch(`${BASE}/api/sounds/${id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ subs_only, password: PASSWORD })
  });
}

async function deleteSound(id, cmd) {
  if (!confirm(`Eliminar "${cmd}"? Esta accion no se puede deshacer.`)) return;
  const res = await fetch(`${BASE}/api/sounds/${id}?password=${encodeURIComponent(PASSWORD)}`, { method: 'DELETE' });
  if (res.ok) { showToast('Sonido eliminado'); loadSounds(); }
  else showToast('Error al eliminar', true);
}

async function testSound(id) {
  const res = await fetch(`${BASE}/api/test/${id}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ password: PASSWORD })
  });
  if (res.ok) showToast('Reproduciendo en OBS...');
  else showToast('No hay OBS conectado', true);
}

function openEdit(id) {
  const s = ALL_SOUNDS.find(x => x.id === id);
  if (!s) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-cmd').value = s.command;
  document.getElementById('edit-cooldown').value = s.cooldown;
  const vol = s.volume ?? 80;
  const editVol = document.getElementById('edit-vol');
  editVol.value = vol;
  editVol.style.setProperty('--val', Math.round(vol / 2) + '%');
  document.getElementById('edit-vol-pct').textContent = vol + '%';
  document.getElementById('edit-subs-only').checked = !!s.subs_only;
  document.getElementById('edit-file').value = '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveEdit() {
  const id = parseInt(document.getElementById('edit-id').value);
  const cmd = document.getElementById('edit-cmd').value.trim();
  const cooldown = parseInt(document.getElementById('edit-cooldown').value);
  const volume = parseInt(document.getElementById('edit-vol').value);
  const subs_only = document.getElementById('edit-subs-only').checked;
  const file = document.getElementById('edit-file').files[0];
  if (!cmd) { showToast('El comando no puede estar vacio', true); return; }

  if (file) {
    const fd = new FormData();
    fd.append('command', cmd); fd.append('cooldown', cooldown);
    fd.append('volume', volume); fd.append('subs_only', subs_only ? '1' : '0');
    fd.append('password', PASSWORD); fd.append('file', file);
    const r = await fetch(`${BASE}/api/sounds`, { method: 'POST', body: fd });
    if (!r.ok) { showToast('Error al subir', true); return; }
    await fetch(`${BASE}/api/sounds/${id}?password=${encodeURIComponent(PASSWORD)}`, { method: 'DELETE' });
  } else {
    await fetch(`${BASE}/api/sounds/${id}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ command: cmd, cooldown, volume, subs_only, password: PASSWORD })
    });
  }
  closeModal(); showToast('Guardado'); loadSounds();
}

function copyObs() {
  navigator.clipboard.writeText(document.getElementById('obs-url').textContent)
    .then(() => showToast('URL copiada'));
}

function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${error ? 'fail' : 'success'} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Restore localStorage on page load
(function init() {
  const savedVol = localStorage.getItem('globalVol');
  if (savedVol !== null) {
    const v = parseInt(savedVol);
    const slider = document.getElementById('global-vol');
    slider.value = v;
    document.getElementById('global-vol-pct').textContent = v + '%';
    slider.style.setProperty('--val', (v / 2) + '%');
  }
  const savedUser = localStorage.getItem('selectedUser');
  if (savedUser) selectUser(savedUser);
})();

const _origSelectUser = selectUser;
selectUser = function(type) {
  _origSelectUser(type);
  localStorage.setItem('selectedUser', type);
};
</script>
</body>
</html>
