<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Kick Audios</title>
<style>
:root {
  --green: #53fc18;
  --green-dim: rgba(83,252,24,0.12);
  --red: #ff4d4d;
  --blue: #4d9fff;
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #181818;
  --border: #222;
  --text: #e0e0e0;
  --muted: #666;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* â”€â”€ LOGIN â”€â”€ */
#login-screen {
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  background: radial-gradient(ellipse at center, #0d1f0d 0%, #0a0a0a 70%);
}
.login-card {
  background: var(--surface); border: 1px solid #1f3a1f;
  border-radius: 20px; padding: 48px 40px; width: 360px; text-align: center;
  box-shadow: 0 0 60px rgba(83,252,24,0.08);
}
.login-logo { font-size: 2.5rem; margin-bottom: 8px; }
.login-card h2 { font-size: 1.4rem; margin-bottom: 4px; }
.login-card p { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }
.input-wrap { position: relative; margin-bottom: 14px; }
.input-wrap input {
  width: 100%; padding: 12px 16px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
}
.input-wrap input:focus { border-color: var(--green); }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 20px; border: none; border-radius: 10px; cursor: pointer;
  font-size: 0.88rem; font-weight: 600; transition: opacity 0.15s, transform 0.1s;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.97); }
.btn-green { background: var(--green); color: #000; }
.btn-red { background: var(--red); color: #fff; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg { color: var(--red); font-size: 0.82rem; margin-top: 10px; min-height: 18px; }
.role-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
}
.role-admin { background: rgba(83,252,24,0.15); color: var(--green); border: 1px solid rgba(83,252,24,0.3); }
.role-mod { background: rgba(77,159,255,0.15); color: var(--blue); border: 1px solid rgba(77,159,255,0.3); }

/* â”€â”€ HEADER â”€â”€ */
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 60px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
.logo { font-size: 1.1rem; font-weight: 700; color: var(--green); flex-shrink: 0; }
.channel-tag { color: var(--muted); font-size: 0.82rem; }
.spacer { flex: 1; }
.vol-wrap { display: flex; align-items: center; gap: 10px; }
.vol-wrap label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
.vol-slider {
  -webkit-appearance: none; width: 110px; height: 4px;
  background: linear-gradient(to right, var(--green) 0%, var(--green) var(--val, 80%), #333 var(--val, 80%), #333 100%);
  border-radius: 4px; outline: none; cursor: pointer;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--green); border-radius: 50%; cursor: pointer;
}
.vol-pct { font-size: 0.8rem; color: var(--green); width: 32px; text-align: right; }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* â”€â”€ LAYOUT â”€â”€ */
.container { max-width: 960px; margin: 0 auto; padding: 28px 16px; }

/* â”€â”€ OBS URL BANNER â”€â”€ */
.obs-banner {
  background: var(--green-dim); border: 1px solid rgba(83,252,24,0.25);
  border-radius: 12px; padding: 12px 18px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.obs-banner label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 2px; }
.obs-url { font-family: monospace; color: var(--green); font-size: 0.85rem; }

/* â”€â”€ CARD â”€â”€ */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.card-title { font-size: 0.95rem; font-weight: 700; color: var(--green); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

/* â”€â”€ FORM â”€â”€ */
.form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.field label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; }
.field input[type=text], .field input[type=number] {
  width: 100%; padding: 10px 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--green); }
.field input.error { border-color: var(--red); }
.field-error { color: var(--red); font-size: 0.75rem; margin-top: 3px; }
.file-drop {
  border: 2px dashed var(--border); border-radius: 10px; padding: 20px;
  text-align: center; cursor: pointer; transition: all 0.2s; position: relative; margin-bottom: 14px;
}
.file-drop:hover, .file-drop.over { border-color: var(--green); background: var(--green-dim); }
.file-drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.file-drop-icon { font-size: 1.5rem; margin-bottom: 4px; }
.file-drop p { font-size: 0.82rem; color: var(--muted); }
.file-drop .file-chosen { color: var(--green); font-size: 0.85rem; font-weight: 600; }
.vol-field { display: flex; flex-direction: column; gap: 6px; }
.vol-field label { font-size: 0.75rem; color: var(--muted); }
.vol-row { display: flex; align-items: center; gap: 10px; }
.vol-field .vol-slider { width: 100%; }
.form-footer { display: flex; align-items: center; gap: 10px; }

/* â”€â”€ TABLE â”€â”€ */
.table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.count-badge { background: var(--green); color: #000; border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; font-weight: 700; }
.search-input {
  padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 0.85rem; outline: none; width: 200px; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--green); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 8px 12px; font-size: 0.75rem; color: var(--muted); border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid #151515; vertical-align: middle; }
tr:hover td { background: #131313; }
.cmd { font-family: monospace; background: var(--green-dim); color: var(--green); padding: 3px 8px; border-radius: 5px; font-size: 0.85rem; }
.filename { color: var(--muted); font-size: 0.8rem; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.toggle { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: #333; border-radius: 20px; transition: .25s; }
.slider:before { content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #666; border-radius: 50%; transition: .25s; }
input:checked + .slider { background: rgba(83,252,24,0.3); }
input:checked + .slider:before { transform: translateX(18px); background: var(--green); }
.row-vol { display: flex; align-items: center; gap: 6px; }
.row-vol input[type=range] {
  -webkit-appearance: none; width: 70px; height: 3px;
  background: linear-gradient(to right, var(--green) 0%, var(--green) var(--val, 80%), #333 var(--val, 80%), #333 100%);
  border-radius: 3px; outline: none; cursor: pointer;
}
.row-vol input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--green); border-radius: 50%; cursor: pointer; }
.row-vol span { font-size: 0.75rem; color: var(--muted); width: 28px; }
.actions { display: flex; gap: 5px; }
.btn-sm { padding: 5px 10px; font-size: 0.78rem; border-radius: 7px; }
.empty-state { text-align: center; padding: 48px; color: var(--muted); }
.empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

/* â”€â”€ MODAL â”€â”€ */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 420px; max-width: 95vw; }
.modal h3 { margin-bottom: 20px; color: var(--green); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* â”€â”€ TOAST â”€â”€ */
.toast {
  position: fixed; bottom: 24px; right: 24px; min-width: 200px;
  padding: 12px 18px; border-radius: 10px; font-size: 0.88rem; font-weight: 500;
  opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: #0d2a0d; border: 1px solid var(--green); color: var(--green); }
.toast.fail { background: #2a0d0d; border: 1px solid var(--red); color: var(--red); }

@media (max-width: 640px) {
  .form-grid { grid-template-columns: 1fr; }
  header { padding: 0 16px; }
  .vol-wrap { display: none; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">ðŸŽµ</div>
    <h2>Bot Kick Audios</h2>
    <p>Panel de administraciÃ³n</p>
    <div class="input-wrap">
      <input type="password" id="pwd" placeholder="ContraseÃ±a" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-green btn-full" onclick="doLogin()">Entrar</button>
    <div class="error-msg" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <span class="logo">ðŸŽµ Bot Kick</span>
    <span class="channel-tag">kick.com/tutomanx</span>
    <span id="role-badge" class="role-badge"></span>
    <div class="spacer"></div>
    <div class="vol-wrap">
      <label>Volumen global</label>
      <input type="range" class="vol-slider" id="global-vol" min="0" max="200" value="80"
        oninput="updateGlobalVol(this.value)" style="--val:80%">
      <span class="vol-pct" id="global-vol-pct">80%</span>
    </div>
    <button class="logout-btn" onclick="logout()">Salir</button>
  </header>

  <div class="container">

    <!-- OBS Banner -->
    <div class="obs-banner">
      <div style="flex:1">
        <label>URL para OBS Browser Source</label>
        <span class="obs-url" id="obs-url"></span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="copyObs()">ðŸ“‹ Copiar</button>
    </div>

    <!-- Agregar sonido -->
    <div class="card" id="add-card">
      <div class="card-title">+ Agregar nuevo sonido</div>
      <div class="form-grid">
        <div class="field">
          <label>Comando <span style="color:var(--red)">*</span></label>
          <input type="text" id="new-cmd" placeholder="!misonido" oninput="clearFieldError('new-cmd')">
          <div class="field-error" id="err-cmd"></div>
        </div>
        <div class="field">
          <label>Cooldown (seg)</label>
          <input type="number" id="new-cooldown" value="10" min="0" max="300">
        </div>
        <div class="vol-field field">
          <label>Volumen del sonido</label>
          <div class="vol-row">
            <input type="range" class="vol-slider" id="new-vol" min="0" max="200" value="80"
              oninput="syncVolLabel('new-vol','new-vol-pct')" style="--val:80%">
            <span class="vol-pct" id="new-vol-pct">80%</span>
          </div>
        </div>
      </div>
      <div class="file-drop" id="drop-zone"
        ondragover="event.preventDefault();this.classList.add('over')"
        ondragleave="this.classList.remove('over')"
        ondrop="handleDrop(event)">
        <input type="file" id="new-file" accept="audio/*" onchange="onFileChange(this)">
        <div class="file-drop-icon">ðŸŽµ</div>
        <p>Arrastra un archivo de audio o haz click para seleccionar</p>
        <p style="margin-top:4px;font-size:0.75rem">MP3, WAV, OGG â€” mÃ¡x. 20 MB</p>
        <div class="file-chosen" id="file-chosen" style="display:none"></div>
      </div>
      <div class="field-error" id="err-file" style="margin-bottom:10px"></div>
      <div class="form-footer">
        <button class="btn btn-green" id="add-btn" onclick="addSound()">Subir sonido</button>
        <span id="add-status" style="font-size:0.82rem;color:var(--muted)"></span>
      </div>
    </div>

    <!-- Lista de sonidos -->
    <div class="card">
      <div class="table-header">
        <div class="card-title" style="margin:0">Sonidos configurados <span class="count-badge" id="count">0</span></div>
        <input type="text" class="search-input" placeholder="ðŸ” Buscar..." oninput="filterTable(this.value)">
      </div>
      <div id="sounds-container"><div class="empty-state"><div class="icon">ðŸŽµ</div>Cargando...</div></div>
    </div>

  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3>Editar sonido</h3>
    <input type="hidden" id="edit-id">
    <div class="field" style="margin-bottom:14px">
      <label>Comando</label>
      <input type="text" id="edit-cmd">
    </div>
    <div class="form-grid-2" style="margin-bottom:14px">
      <div class="field">
        <label>Cooldown (seg)</label>
        <input type="number" id="edit-cooldown" min="0" max="300">
      </div>
      <div class="vol-field field">
        <label>Volumen</label>
        <div class="vol-row">
          <input type="range" class="vol-slider" id="edit-vol" min="0" max="200"
            oninput="syncVolLabel('edit-vol','edit-vol-pct')" style="--val:80%">
          <span class="vol-pct" id="edit-vol-pct">80%</span>
        </div>
      </div>
    </div>
    <div class="field" style="margin-bottom:4px">
      <label>Reemplazar audio (opcional)</label>
      <input type="file" id="edit-file" accept="audio/*"
        style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text)">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = location.origin;
let PASSWORD = '';
let ROLE = '';
let ALL_SOUNDS = [];

async function doLogin() {
  const pwd = document.getElementById('pwd').value.trim();
  if (!pwd) { document.getElementById('login-err').textContent = 'Escribe tu contraseÃ±a'; return; }
  const res = await fetch(`${BASE}/api/auth`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ password: pwd })
  });
  if (!res.ok) { document.getElementById('login-err').textContent = 'ContraseÃ±a incorrecta'; return; }
  const data = await res.json();
  PASSWORD = pwd;
  ROLE = data.role;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('obs-url').textContent = `${BASE}/obs`;
  const badge = document.getElementById('role-badge');
  badge.textContent = ROLE === 'admin' ? 'ðŸ‘‘ Admin' : 'ðŸ›¡ï¸ Moderador';
  badge.className = `role-badge ${ROLE === 'admin' ? 'role-admin' : 'role-mod'}`;
  if (ROLE !== 'admin') document.getElementById('add-card').style.display = 'none'; // mods can add too
  loadSounds();
}

function logout() {
  PASSWORD = ''; ROLE = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwd').value = '';
  document.getElementById('login-err').textContent = '';
}

// â”€â”€ VOLUME â”€â”€
function syncVolLabel(sliderId, labelId) {
  const val = document.getElementById(sliderId).value;
  document.getElementById(labelId).textContent = val + '%';
  document.getElementById(sliderId).style.setProperty('--val', val + '%');
}

function updateGlobalVol(val) {
  document.getElementById('global-vol-pct').textContent = val + '%';
  document.getElementById('global-vol').style.setProperty('--val', val + '%');
  // Store in localStorage so OBS remembers
  localStorage.setItem('globalVol', val);
  // Broadcast to OBS (via a hidden iframe ping is not needed â€” just store and OBS reads it)
}

// â”€â”€ FILE DROP â”€â”€
function onFileChange(input) {
  const f = input.files[0];
  if (f) {
    document.getElementById('file-chosen').textContent = 'âœ“ ' + f.name;
    document.getElementById('file-chosen').style.display = 'block';
    document.getElementById('drop-zone').querySelector('p').style.display = 'none';
    clearFieldError('err-file');
  }
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) {
    const dt = new DataTransfer();
    dt.items.add(f);
    document.getElementById('new-file').files = dt.files;
    onFileChange(document.getElementById('new-file'));
  }
}

// â”€â”€ VALIDATION â”€â”€
function clearFieldError(id) { document.getElementById('err-' + id.replace('new-','')).textContent = ''; document.getElementById(id).classList.remove('error'); }
function setFieldError(inputId, errId, msg) {
  document.getElementById(errId).textContent = msg;
  document.getElementById(inputId)?.classList.add('error');
}

function validateAddForm() {
  let ok = true;
  const cmd = document.getElementById('new-cmd').value.trim();
  const file = document.getElementById('new-file').files[0];
  if (!cmd) { setFieldError('new-cmd', 'err-cmd', 'El comando es obligatorio'); ok = false; }
  else if (cmd.length < 2) { setFieldError('new-cmd', 'err-cmd', 'MÃ­nimo 2 caracteres'); ok = false; }
  if (!file) { document.getElementById('err-file').textContent = 'Selecciona un archivo de audio'; ok = false; }
  else {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['mp3','wav','ogg','m4a'].includes(ext)) { document.getElementById('err-file').textContent = 'Solo MP3, WAV u OGG'; ok = false; }
    if (file.size > 20*1024*1024) { document.getElementById('err-file').textContent = 'MÃ¡ximo 20 MB'; ok = false; }
  }
  return ok;
}

// â”€â”€ SOUNDS â”€â”€
async function loadSounds() {
  const res = await fetch(`${BASE}/api/sounds`);
  ALL_SOUNDS = await res.json();
  renderTable(ALL_SOUNDS);
}

function renderTable(sounds) {
  document.getElementById('count').textContent = sounds.length;
  const el = document.getElementById('sounds-container');
  if (!sounds.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">ðŸŽµ</div>No hay sonidos todavÃ­a. Â¡Agrega el primero!</div>';
    return;
  }
  const isAdmin = ROLE === 'admin';
  el.innerHTML = `<table>
    <thead><tr>
      <th>Comando</th><th>Archivo</th><th>Cooldown</th><th>Volumen</th><th>Activo</th><th>Acciones</th>
    </tr></thead>
    <tbody>
    ${sounds.map(s => {
      const vol = s.volume ?? 80;
      return `<tr data-id="${s.id}">
        <td><span class="cmd">${s.command}</span></td>
        <td><span class="filename" title="${s.filename}">${s.filename}</span></td>
        <td>${s.cooldown}s</td>
        <td>
          <div class="row-vol">
            <input type="range" min="0" max="100" value="${vol}"
              style="--val:${vol}%"
              oninput="onRowVolChange(this,${s.id})"
              onchange="saveVolume(${s.id}, this.value)">
            <span>${vol}%</span>
          </div>
        </td>
        <td>
          <label class="toggle">
            <input type="checkbox" ${s.active ? 'checked' : ''} onchange="toggleActive(${s.id},this.checked)">
            <span class="slider"></span>
          </label>
        </td>
        <td>
          <div class="actions">
            <button class="btn btn-blue btn-sm" onclick="testSound(${s.id})" title="Probar">â–¶</button>
            <button class="btn btn-ghost btn-sm" onclick="openEdit(${s.id})">âœï¸</button>
            ${isAdmin ? `<button class="btn btn-red btn-sm" onclick="deleteSound(${s.id},'${s.command}')">âœ•</button>` : ''}
          </div>
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}

function filterTable(q) {
  const filtered = ALL_SOUNDS.filter(s =>
    s.command.toLowerCase().includes(q.toLowerCase()) ||
    s.filename.toLowerCase().includes(q.toLowerCase())
  );
  renderTable(filtered);
}

function onRowVolChange(input, id) {
  const val = input.value;
  input.style.setProperty('--val', val + '%');
  input.closest('td').querySelector('span').textContent = val + '%';
}

async function saveVolume(id, vol) {
  await fetch(`${BASE}/api/sounds/${id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ volume: parseInt(vol), password: PASSWORD })
  });
  const s = ALL_SOUNDS.find(x => x.id === id);
  if (s) s.volume = parseInt(vol);
  showToast('Volumen guardado');
}

async function addSound() {
  if (!validateAddForm()) return;
  const btn = document.getElementById('add-btn');
  const status = document.getElementById('add-status');
  btn.disabled = true; btn.textContent = 'Subiendo...';
  status.textContent = '';

  const fd = new FormData();
  fd.append('command', document.getElementById('new-cmd').value.trim());
  fd.append('cooldown', document.getElementById('new-cooldown').value);
  fd.append('volume', document.getElementById('new-vol').value);
  fd.append('password', PASSWORD);
  fd.append('file', document.getElementById('new-file').files[0]);

  const res = await fetch(`${BASE}/api/sounds`, { method: 'POST', body: fd });
  btn.disabled = false; btn.textContent = 'Subir sonido';

  if (res.ok) {
    showToast('Sonido agregado');
    document.getElementById('new-cmd').value = '';
    document.getElementById('new-file').value = '';
    document.getElementById('file-chosen').style.display = 'none';
    document.getElementById('drop-zone').querySelector('p').style.display = 'block';
    loadSounds();
  } else {
    const err = await res.json();
    status.textContent = err.detail || 'Error al subir';
    status.style.color = 'var(--red)';
  }
}

async function toggleActive(id, active) {
  await fetch(`${BASE}/api/sounds/${id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ active, password: PASSWORD })
  });
  const s = ALL_SOUNDS.find(x => x.id === id);
  if (s) s.active = active;
}

async function deleteSound(id, cmd) {
  if (!confirm(`Â¿Eliminar "${cmd}"? Esta acciÃ³n no se puede deshacer.`)) return;
  const res = await fetch(`${BASE}/api/sounds/${id}?password=${encodeURIComponent(PASSWORD)}`, { method: 'DELETE' });
  if (res.ok) { showToast('Sonido eliminado'); loadSounds(); }
  else showToast('Error al eliminar', true);
}

async function testSound(id) {
  const res = await fetch(`${BASE}/api/test/${id}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ password: PASSWORD })
  });
  if (res.ok) showToast('â–¶ Reproduciendo en OBS');
  else showToast('No hay OBS conectado', true);
}

function openEdit(id) {
  const s = ALL_SOUNDS.find(x => x.id === id);
  if (!s) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-cmd').value = s.command;
  document.getElementById('edit-cooldown').value = s.cooldown;
  const vol = s.volume ?? 80;
  document.getElementById('edit-vol').value = vol;
  document.getElementById('edit-vol').style.setProperty('--val', vol + '%');
  document.getElementById('edit-vol-pct').textContent = vol + '%';
  document.getElementById('edit-file').value = '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveEdit() {
  const id = parseInt(document.getElementById('edit-id').value);
  const cmd = document.getElementById('edit-cmd').value.trim();
  const cooldown = parseInt(document.getElementById('edit-cooldown').value);
  const volume = parseInt(document.getElementById('edit-vol').value);
  const file = document.getElementById('edit-file').files[0];

  if (!cmd) { showToast('El comando no puede estar vacÃ­o', true); return; }

  if (file) {
    const fd = new FormData();
    fd.append('command', cmd);
    fd.append('cooldown', cooldown);
    fd.append('volume', volume);
    fd.append('password', PASSWORD);
    fd.append('file', file);
    const r1 = await fetch(`${BASE}/api/sounds`, { method: 'POST', body: fd });
    if (!r1.ok) { showToast('Error al subir nuevo audio', true); return; }
    await fetch(`${BASE}/api/sounds/${id}?password=${encodeURIComponent(PASSWORD)}`, { method: 'DELETE' });
  } else {
    await fetch(`${BASE}/api/sounds/${id}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ command: cmd, cooldown, volume, password: PASSWORD })
    });
  }
  closeModal();
  showToast('Guardado');
  loadSounds();
}

function copyObs() {
  navigator.clipboard.writeText(document.getElementById('obs-url').textContent)
    .then(() => showToast('URL copiada'));
}

function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${error ? 'fail' : 'success'} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
