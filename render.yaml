services:
  - type: web
    name: bot-kick-audios
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: KICK_CHANNEL
        value: tutomanx
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_URL
        sync: false
